<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>有機化學完整講義</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap');

:root {
  --bg: #080e1a;
  --bg2: #0d1525;
  --bg3: #111d33;
  --navy: #1a2a4a;
  --blue: #3d8ef0;
  --blue-l: #7eb8ff;
  --teal: #00c4a7;
  --teal-d: #007a68;
  --amber: #f59e0b;
  --amber-l: #fcd34d;
  --red: #f87171;
  --red-d: #dc2626;
  --purple: #a78bfa;
  --purple-d: #6d28d9;
  --green: #34d399;
  --green-d: #065f46;
  --pink: #f472b6;
  --gray: #94a3b8;
  --gray-l: #cbd5e1;
  --white: #f1f5f9;
  --border: rgba(255,255,255,0.07);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--white);
  line-height: 1.6;
}

.hero {
  background: linear-gradient(135deg, #0d1525 0%, #1a2a4a 50%, #0d1525 100%);
  border-bottom: 1px solid var(--border);
  padding: 60px 24px 40px;
  text-align: center;
  position: relative;
}

.hero-tag {
  display: inline-block;
  background: rgba(61,142,240,0.15);
  border: 1px solid rgba(61,142,240,0.3);
  color: var(--blue-l);
  font-size: 0.75rem;
  letter-spacing: 3px;
  padding: 4px 14px;
  border-radius: 20px;
  margin-bottom: 16px;
}

.hero h1 {
  font-size: 2.2rem;
  font-weight: 900;
  background: linear-gradient(135deg, var(--blue-l), var(--teal), var(--amber-l));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}

.nav-wrap {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  overflow-x: auto;
}

.nav { display: flex; padding: 0 16px; }

.nav-btn {
  background: none; border: none; color: var(--gray);
  padding: 16px 20px; cursor: pointer; white-space: nowrap;
  font-size: 0.9rem; transition: 0.3s;
}

.nav-btn.active { color: var(--blue-l); border-bottom: 2px solid var(--blue); }

.content { max-width: 900px; margin: 0 auto; padding: 30px 20px; }

.section { display: none; }
.section.active { display: block; }

.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px;
  margin-bottom: 20px;
}

table {
  width: 100%; border-collapse: collapse; margin-top: 15px;
  background: var(--bg3); border-radius: 8px; overflow: hidden;
}

th { background: var(--navy); color: var(--blue-l); padding: 12px; text-align: left; }
td { padding: 12px; border-bottom: 1px solid var(--border); color: var(--gray-l); }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-tag">化學選修⑤ · 第一章</div>
  <h1>有機化學完整講義</h1>
  <p>反應 · 製備 · 命名 · 檢驗 全部串連在一起</p>
</div>

<div class="nav-wrap">
  <div class="nav">
    <button class="nav-btn active" onclick="switchTab(0)">🏠 總覽</button>
    <button class="nav-btn" onclick="switchTab(1)">🔗 烴類</button>
    <button class="nav-btn" onclick="switchTab(2)">🧪 官能基</button>
  </div>
</div>

<div class="content">
  <div class="section active" id="tab0">
    <div class="card">
      <h2 style="color:var(--teal); margin-bottom:15px;">官能基一覽 & 轉換地圖</h2>
      <table>
        <tr><th>類別</th><th>官能基</th><th>通式</th><th>混成</th></tr>
        <tr><td>烷</td><td>無</td><td>CnH2n+2</td><td>sp3</td></tr>
        <tr><td>烯</td><td>C=C</td><td>CnH2n</td><td>sp2</td></tr>
        <tr><td>炔</td><td>C≡C</td><td>CnH2n-2</td><td>sp</td></tr>
        <tr><td>醇</td><td>-OH</td><td>ROH</td><td>sp3</td></tr>
      </table>
    </div>
  </div>
</div>

<script>
function switchTab(i) {
  document.querySelectorAll('.section').forEach((s,j) => s.classList.toggle('active', j === i));
  document.querySelectorAll('.nav-btn').forEach((b,j) => b.classList.toggle('active', j === i));
}
</script>
</body>
</html>
